name: RepoFlow CI
on:
  push:
    branches:
      - main
  pull_request: {}
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run build
